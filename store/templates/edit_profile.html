    {% extends 'base.html' %}

    {% block content %}

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

    body{
        background:linear-gradient(135deg,#667eea,#764ba2);
        min-height:100vh;
    }

    /* MAIN CARD */

    .profile-wrapper{
        display:flex;
        justify-content:center;
        align-items:center;
        padding:50px 20px;
    }

    .profile-card{
        width:100%;
        max-width:750px;
        background:white;
        border-radius:25px;
        padding:40px;
        box-shadow:0 10px 40px rgba(0,0,0,0.15);
        animation:fadeIn 0.6s ease;
    }

    @keyframes fadeIn{
        from{
            opacity:0;
            transform:translateY(20px);
        }
        to{
            opacity:1;
            transform:translateY(0);
        }
    }

    /* TITLE */

    .title{
        text-align:center;
        margin-bottom:35px;
    }

    .title h2{
        font-weight:800;
        color:#333;
    }

    .title p{
        color:#777;
    }

    /* PROFILE IMAGE */

    .profile-preview{
        width:120px;
        height:120px;
        border-radius:50%;
        object-fit:cover;
        border:4px solid #6c63ff;
        margin:auto;
        display:block;
        margin-bottom:25px;
    }

    /* INPUTS */

    .form-label{
        font-weight:600;
        color:#444;
    }

    .form-control,
    .form-select{
        border-radius:12px;
        padding:12px;
        border:1px solid #ddd;
    }

    .form-control:focus,
    .form-select:focus{
        border-color:#6c63ff;
        box-shadow:0 0 0 0.2rem rgba(108,99,255,0.2);
    }

    /* BUTTON */

    .save-btn{
        width:100%;
        background:#6c63ff;
        color:white;
        border:none;
        padding:14px;
        border-radius:12px;
        font-weight:700;
        transition:0.3s;
    }

    .save-btn:hover{
        background:#574bdb;
        transform:translateY(-2px);
    }

    /* SECTION */

    .section-title{
        margin-top:25px;
        margin-bottom:15px;
        font-size:20px;
        font-weight:700;
        color:#555;
    }

    </style>

    <div class="profile-wrapper">

        <div class="profile-card">

            <div class="title">

                <h2>Edit Profile</h2>

                <p>
                    Update your personal information
                </p>

            </div>

            <!-- PROFILE IMAGE -->

            {% if form.instance.profile_pic %}
                <img src="{{ form.instance.profile_pic.url }}"
                    class="profile-preview">
            {% endif %}

            <form method="POST" enctype="multipart/form-data">

                {% csrf_token %}

                <!-- PROFILE PHOTO -->

                <div class="mb-4">

                    <label class="form-label">
                        Profile Picture
                    </label>

                    {{ form.profile_pic }}

                </div>

                <!-- PHONE -->

                <div class="mb-4">

                    <label class="form-label">
                        Phone Number
                    </label>

                    {{ form.phone }}

                </div>

                <!-- ADDRESS SECTION -->

                <div class="section-title">
                    Address Details
                </div>

                <!-- CITY -->

                <div class="mb-3">

                    <label class="form-label">
                        City
                    </label>

                    <select class="form-select" name="city">

                        <option>Ahmedabad</option>
                        <option>Surat</option>
                        <option>Vadodara</option>
                        <option>Rajkot</option>
                        <option>Mumbai</option>
                        <option>Delhi</option>

                    </select>

                </div>

                <!-- AREA -->

                <div class="mb-3">

                    <label class="form-label">
                        Area
                    </label>

                    <input type="text"
                        name="area"
                        class="form-control"
                        placeholder="Enter your area">

                </div>

                <!-- HOUSE NUMBER -->

                <div class="mb-3">

                    <label class="form-label">
                        House / Flat Number
                    </label>

                    <input type="text"
                        name="house"
                        class="form-control"
                        placeholder="Flat no / House no">

                </div>

                <!-- LANDMARK -->

                <div class="mb-4">

                    <label class="form-label">
                        Landmark
                    </label>

                    <input type="text"
                        name="landmark"
                        class="form-control"
                        placeholder="Near temple, mall etc">

                </div>

                <!-- FULL ADDRESS -->

                <div class="mb-4">

                    <label class="form-label">
                        Full Address
                    </label>

                    {{ form.address }}

                </div>

                <!-- SAVE BUTTON -->

                <button type="submit"
                        class="save-btn">

                    Save Profile

                </button>

            </form>

        </div>

    </div>

    {% endblock %}
