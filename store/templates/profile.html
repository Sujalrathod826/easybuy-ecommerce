{% extends 'base.html' %}

{% block content %}

<!-- Bootstrap CDN -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

/* PAGE BACKGROUND */
body{
    background: linear-gradient(135deg,#667eea,#764ba2);
    min-height:100vh;
}

/* PROFILE CARD */
.profile-card{
    border:none;
    border-radius:25px;
    overflow:hidden;
    background:white;
}

/* PROFILE IMAGE */
.profile-img{
    width:140px;
    height:140px;
    object-fit:cover;
    border:5px solid white;
    box-shadow:0 4px 20px rgba(0,0,0,0.2);
}

/* INFO BOX */
.info-box{
    background:#f8f9fa;
    border-radius:15px;
    padding:15px;
    transition:0.3s;
}

.info-box:hover{
    transform:translateY(-3px);
    background:#eef1ff;
}

/* ACTION CARDS */
.profile-options{
    display:flex;
    justify-content:center;
    gap:20px;
    flex-wrap:wrap;
    margin-top:30px;
}

.profile-option-card{
    width:180px;
    text-decoration:none;
    background:white;
    padding:25px 20px;
    border-radius:20px;
    text-align:center;
    color:black;
    box-shadow:0 4px 15px rgba(0,0,0,0.1);
    transition:0.3s;
}

.profile-option-card:hover{
    transform:translateY(-5px);
    background:#6c63ff;
    color:white;
}

.profile-option-card h5{
    margin-top:10px;
    font-weight:600;
}

/* BUTTON */
.edit-btn{
    border-radius:30px;
    padding:10px 25px;
}

</style>

<div class="container py-5">

    <div class="row justify-content-center">

        <div class="col-lg-8">

            <!-- PROFILE CARD -->
            <div class="card shadow-lg profile-card">

                <div class="card-body text-center p-5">

                    <!-- PROFILE IMAGE -->
                    <img src="{{ profile.profile_pic.url }}"
                         class="rounded-circle profile-img">

                    <!-- USER INFO -->
                    <h2 class="mt-4 fw-bold">
                        {{ profile.user.username }}
                    </h2>

                    <p class="text-muted">
                        {{ profile.user.email }}
                    </p>

                    <hr class="my-4">

                    <!-- DETAILS -->
                    <div class="row">

                        <div class="col-md-6 mb-3">

                            <div class="info-box">

                                <h6>📞 Phone</h6>

                                <p class="mb-0">
                                    {{ profile.phone }}
                                </p>

                            </div>

                        </div>

                        <div class="col-md-6 mb-3">

                            <div class="info-box">

                                <h6>📍 Address</h6>

                                <p class="mb-0">
                                    {{ profile.address }}
                                </p>

                            </div>

                        </div>

                    </div>

                    <!-- EDIT PROFILE BUTTON -->
                    <div class="mt-4">

                        <a href="{% url 'edit_profile' %}"
                           class="btn btn-primary edit-btn">

                            Edit Profile

                        </a>

                    </div>

                </div>

            </div>

            <!-- PROFILE OPTIONS -->
            <div class="profile-options">

                <!-- DASHBOARD -->
                <a href="{% url 'dashboard' %}"
                   class="profile-option-card">

                    <h1>📊</h1>

                    <h5>Dashboard</h5>

                </a>

                <!-- CART -->
                <a href="{% url 'cart' %}"
                   class="profile-option-card">

                    <h1>🛒</h1>

                    <h5>Cart</h5>

                </a>

                <!-- ORDERS -->
                <a href="{% url 'my_orders' %}"
                   class="profile-option-card">

                    <h1>📦</h1>

                    <h5>My Orders</h5>

                </a>    

            </div>

        </div>

    </div>

</div>

{% endblock %}
