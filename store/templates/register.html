{% extends 'base.html' %}

{% block content %}

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

/* ===== BACKGROUND ===== */

body{
    margin:0;
    background:linear-gradient(-45deg,#4e54c8,#8f94fb,#6a11cb,#2575fc);
    background-size:400% 400%;
    animation:gradientBG 10s ease infinite;
    overflow-x:hidden;
}

@keyframes gradientBG{

    0%{
        background-position:0% 50%;
    }

    50%{
        background-position:100% 50%;
    }

    100%{
        background-position:0% 50%;
    }
}

/* ===== WRAPPER ===== */

.register-wrapper{

    min-height:100vh;

    display:flex;

    justify-content:center;

    align-items:center;

    padding:20px;
}

/* ===== CARD ===== */

.register-card{

    width:100%;

    max-width:430px;

    background:rgba(255,255,255,0.15);

    backdrop-filter:blur(15px);

    border-radius:20px;

    padding:35px;

    box-shadow:0 20px 40px rgba(0,0,0,0.25);

    color:white;
}

/* ===== TITLE ===== */

.register-card h2{

    text-align:center;

    margin-bottom:25px;

    font-weight:700;
}

/* ===== INPUT ===== */

.form-control{

    background:rgba(255,255,255,0.2);

    border:none;

    color:white;

    border-radius:10px;

    padding:12px;
}

.form-control::placeholder{

    color:rgba(255,255,255,0.7);
}

.form-control:focus{

    background:rgba(255,255,255,0.3);

    box-shadow:none;

    color:white;
}

/* ===== BUTTON ===== */

.btn-custom{

    width:100%;

    padding:12px;

    border:none;

    border-radius:10px;

    background:white;

    color:#4e54c8;

    font-weight:700;

    transition:0.3s;
}

.btn-custom:hover{

    transform:scale(1.03);

    background:#f1f1f1;
}

/* ===== FOOTER ===== */

.footer-text{

    margin-top:15px;

    text-align:center;

    font-size:14px;
}

.footer-text a{

    color:white;

    font-weight:bold;

    text-decoration:underline;
}

/* ===== ERROR ===== */

.error-box{

    background:rgba(255,0,0,0.15);

    border:1px solid rgba(255,255,255,0.2);

    padding:12px;

    border-radius:10px;

    margin-bottom:18px;

    font-size:14px;
}

</style>

<div class="register-wrapper">

    <div class="register-card">

        <h2>

            Create Account

        </h2>

        <!-- ERRORS -->

        {% if form.errors %}

            <div class="error-box">

                {% for field in form %}

                    {% for error in field.errors %}

                        <div>

                            {{ error }}

                        </div>

                    {% endfor %}

                {% endfor %}

            </div>

        {% endif %}

        <!-- FORM -->

        <form method="POST">

            {% csrf_token %}

            <div class="mb-3">

                <input type="text"
                       name="username"
                       class="form-control"
                       placeholder="Username"
                       required>

            </div>

            <div class="mb-3">

                <input type="email"
                       name="email"
                       class="form-control"
                       placeholder="Email Address"
                       required>

            </div>

            <div class="mb-3">

                <input type="password"
                       name="password1"
                       class="form-control"
                       placeholder="Password"
                       required>

            </div>

            <div class="mb-3">

                <input type="password"
                       name="password2"
                       class="form-control"
                       placeholder="Confirm Password"
                       required>

            </div>

            <button type="submit"
                    class="btn-custom">

                Create Account

            </button>

        </form>

        <div class="footer-text">

            Already have an account?

            <a href="{% url 'login' %}">

                Login

            </a>

        </div>

    </div>

</div>

{% endblock %}
